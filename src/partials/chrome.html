<!-- Preloader: shutter/exposure wipe. Skips instantly on repeat visits (JS). -->
<div class="preloader" id="preloader" aria-hidden="true">
  <div class="preloader__inner">
    <div class="preloader__mark"><span data-pre-word>OVER EXPOSURE</span></div>
    <div class="preloader__meta">
      <span class="tc">EXPOSING FRAME</span>
      <span class="preloader__readout">
        <span class="preloader__settings">f/1.4 · 1/48 · ISO 800</span>
        <span class="preloader__pct" id="prePct">00%</span>
      </span>
    </div>
    <!-- 35mm sprocket-hole strip: perforations light up one-by-one (JS). -->
    <div class="preloader__bar" id="preBar" aria-hidden="true"></div>
  </div>
</div>
<div class="preloader__shutter" id="shutter" aria-hidden="true">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- Atmospheric overlays -->
<div class="grain" aria-hidden="true"></div>
<div class="vignette" aria-hidden="true"></div>

<!-- Custom cursor (desktop only; hidden via CSS on touch) -->
<div class="cursor" id="cursor" aria-hidden="true"></div>
<div class="cursor-ring" id="cursorRing" aria-hidden="true"><span class="label"></span></div>
