<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script>
  document.documentElement.classList.add('js');
  /* Access gate — lock the site before first paint if this session hasn't
     unlocked yet. Adding the class synchronously in <head> means the gate
     overlay (in chrome.html) covers the page with zero content flash. */
  (function () {
    try { if (sessionStorage.getItem('ox_gate') === 'open') return; } catch (e) {}
    document.documentElement.classList.add('gate-locked');
  })();
</script>
<style>
  /* Critical, framework-independent gate styles so it paints correctly even
     before main.css loads. Full styling lives in main.css. */
  #ox-gate { display: none; }
  html.gate-locked #ox-gate {
    display: flex; position: fixed; inset: 0; z-index: 2147483000;
    align-items: center; justify-content: center; background: #0b0c0e;
  }
  html.gate-locked body { overflow: hidden; }
</style>
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#0B0C0E" />

<title>{{title}}</title>
<meta name="description" content="{{description}}" />
<link rel="canonical" href="{{canonical}}" />
<meta name="robots" content="{{robots}}" />
{{#if googleVerify}}<meta name="google-site-verification" content="{{googleVerify}}" />{{/if}}
<meta name="author" content="Over Exposure Productions" />
<meta name="generator" content="Over Exposure Productions — bespoke build" />

<!-- Open Graph -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Over Exposure Productions" />
<meta property="og:locale" content="en_US" />
<meta property="og:title" content="{{title}}" />
<meta property="og:description" content="{{description}}" />
<meta property="og:url" content="{{canonical}}" />
<meta property="og:image" content="{{ogImage}}" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="Over Exposure Productions — film & video production, Abu Dhabi, UAE" />

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{title}}" />
<meta name="twitter:description" content="{{description}}" />
<meta name="twitter:image" content="{{ogImage}}" />

<!-- Icons / manifest -->
<link rel="icon" href="/assets/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16.png" />
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
<link rel="manifest" href="/assets/site.webmanifest" />

<!-- Fonts: self-hosted, preload the two critical faces -->
<link rel="preload" as="font" type="font/woff2" href="/assets/fonts/bebas-neue-400.woff2" crossorigin />
<link rel="preload" as="font" type="font/woff2" href="/assets/fonts/inter-400.woff2" crossorigin />
{{#if preloadImg}}<link rel="preload" as="image" href="{{preloadImg}}" fetchpriority="high" />{{/if}}

<!-- Structured data -->
{{#if jsonld}}<script type="application/ld+json">{{{jsonld}}}</script>{{/if}}
